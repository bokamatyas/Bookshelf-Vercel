name: E2E Tests

on:
  push:
    branches: 
      - main
      - E2E
      - frontend
  pull_request:
    branches: 
      - main
      - E2E
      - frontend

jobs:
  cypress-e2e:
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:latest
        ports:
          - 27017:27017
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18
          cache: 'npm'

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Seed test database
        working-directory: backend
        run: npm run test:seedCI

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run E2E tests
        working-directory: frontend
        run: |
          # Install wait-on first to prevent ad-hoc installation
          npm install wait-on --no-save

          echo "Starting backend server..."
          cd ../backend && nohup npm start > backend.log 2>&1 &

          echo "Starting frontend server..."
          nohup npm run start > frontend.log 2>&1 &

          echo "Waiting for servers to be ready..."
          npx wait-on -t 300000 http://localhost:4200 http://localhost:3000  # Adjust ports as needed

          echo "Running Cypress tests..."
          npx cypress run --browser chrome --headless

          # Cleanup processes
          pkill -f "node.*(nodemon|ng serve)"
          fuser -k 4200/tcp || true
          fuser -k 3000/tcp || true
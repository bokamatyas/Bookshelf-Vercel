name: E2E Tests

on:
  push:
    branches: 
      - main
      - E2E

  pull_request:
    branches: 
      - main
      - E2E

jobs:
  e2e:
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:latest
        ports:
          - 27017:27017
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18
          cache: 'npm'

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Seed test database
        working-directory: backend
        run: npm run test:seedCI

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run E2E tests
        working-directory: frontend
        run: |
          # Install essential tools
          sudo apt-get install -y netcat

          # Start backend with explicit host binding
          echo "Starting backend server..."
          cd ../backend && nohup npm start -- --host 0.0.0.0 > backend.log 2>&1 &

          # Start frontend with explicit host and port
          echo "Starting frontend server..."
          nohup npm run start -- --host 0.0.0.0 --port 4200 > frontend.log 2>&1 &

          # Verify port accessibility
          echo "Checking ports..."
          timeout 20 bash -c 'until nc -z localhost 4200; do sleep 1; done' || echo "Frontend port not ready"
          timeout 20 bash -c 'until nc -z localhost 3000; do sleep 1; done' || echo "Backend port not ready"

          # Wait with detailed logging
          echo "Waiting for servers..."
          npx wait-on -v -t 300000 http://localhost:4200 http://localhost:3000

          # Debug output
          echo "Server processes:"
          ps aux | grep -E '(nodemon|ng serve)'
          echo "Open ports:"
          netstat -tulpn

          # Run tests
          npx cypress run --browser chrome --headless

          # Cleanup processes
          pkill -f "node.*(nodemon|ng serve)"
          fuser -k 4200/tcp || true
          fuser -k 3000/tcp || true